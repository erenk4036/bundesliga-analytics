# ============================================================
# Bundesliga Analytics - Local Development Stack
# ============================================================
# Simulates the full AWS infrastructure locally:
#   - DynamoDB Local  → replaces AWS DynamoDB
#   - LocalStack S3   → replaces AWS S3
#   - Lambda Container → runs ETL pipeline locally
#
# Start:    docker compose up -d
# Stop:     docker compose down
# Logs:     docker compose logs -f
# ============================================================

services:

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: bundesliga-dynamodb
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  dynamodb-setup:
    image: amazon/aws-cli:latest
    container_name: bundesliga-dynamodb-setup
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: eu-central-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 3
        echo "Creating DynamoDB tables..."

        aws dynamodb create-table \
          --table-name bundesliga-odds-history-dev \
          --attribute-definitions \
            AttributeName=match_id,AttributeType=S \
            AttributeName=timestamp,AttributeType=S \
          --key-schema \
            AttributeName=match_id,KeyType=HASH \
            AttributeName=timestamp,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000

        aws dynamodb create-table \
          --table-name bundesliga-value-bets-dev \
          --attribute-definitions \
            AttributeName=bet_id,AttributeType=S \
          --key-schema \
            AttributeName=bet_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000

        echo "Tables created successfully!"

  localstack:
    image: localstack/localstack:latest
    container_name: bundesliga-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=eu-central-1
      - AWS_DEFAULT_REGION=eu-central-1
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  s3-setup:
    image: amazon/aws-cli:latest
    container_name: bundesliga-s3-setup
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: eu-central-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creating S3 buckets..."
        aws s3 mb s3://bundesliga-raw-data-dev --endpoint-url http://localstack:4566
        aws s3 mb s3://bundesliga-processed-data-dev --endpoint-url http://localstack:4566
        echo "Buckets created!"

  etl-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bundesliga-etl
    depends_on:
      - dynamodb-local
      - localstack
    environment:
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      S3_ENDPOINT: http://localstack:4566
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: eu-central-1
      ODDS_TABLE: bundesliga-odds-history-dev
      BETS_TABLE: bundesliga-value-bets-dev
      RAW_BUCKET: bundesliga-raw-data-dev
      PROCESSED_BUCKET: bundesliga-processed-data-dev
      ENVIRONMENT: local
    profiles:
      - pipeline

volumes:
  localstack-data:

# ============================================================
# Useful commands:
#
# Start all services:
#   docker compose up -d
#
# Run ETL pipeline manually:
#   docker compose --profile pipeline run --rm etl-pipeline
#
# Check DynamoDB tables:
#   aws dynamodb list-tables --endpoint-url http://localhost:8000 \
#     --region eu-central-1 --no-sign-request
#
# Check S3 buckets:
#   aws s3 ls --endpoint-url http://localhost:4566 --no-sign-request
#
# View logs:
#   docker compose logs -f dynamodb-local
#
# Stop and clean up:
#   docker compose down -v
# ============================================================